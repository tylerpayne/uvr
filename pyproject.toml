[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
uv-release = { workspace = true }

[tool.uvr.config]
latest = "uv-release"
workflow_version = "0.29.0a1.dev0"
skill-version = "0.36.0.dev0"

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple/"
publish-url = "https://upload.pypi.org/legacy/"

[tool.uvr.publish]
index = "pypi"
environment = "pypi"

[dependency-groups]
dev = [
    "uv-release",
    "ruff>=0.9",
    "ty>=0.0.1a6",
    "poethepoet>=0.32",
    "pytest>=8.0",
    "pyadr>=0.19.0",
]

[tool.poe.tasks]
format = "ruff format ."
lint = "ruff check ."
lintfix = "ruff check --fix ."
typecheck = "ty check packages/uv-release"
check = ["lint", "typecheck"]
fix = ["lintfix", "format"]
test = "pytest packages/uv-release/tests/ -v"
all = ["fix", "check", "test"]
"docs:dev" = "npx vitepress dev docs"
"docs:build" = "npx vitepress build docs"
"docs:preview" = "npx vitepress preview docs"
