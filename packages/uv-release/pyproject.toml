[project]
name = "uv-release"
version = "0.37.2.dev0"
description = "Lazy monorepo wheel builder."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "diny>=0.2.0",
    "packaging>=23.0",
    "pydantic>=2.0",
    "pygit2>=1.19.1",
    "pyyaml>=6.0",
    "rich>=13.0",
    "tomlkit>=0.12",
]

[project.scripts]
uvr = "uv_release.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uv_release"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=7.1.0",
]
